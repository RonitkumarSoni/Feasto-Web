name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: feasto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: Feasto-Server/package-lock.json
        
    - name: Install dependencies
      working-directory: ./Feasto-Server
      run: npm ci
      
    - name: Generate Prisma Client
      working-directory: ./Feasto-Server
      run: npx prisma generate
      
    - name: Run Prisma Migrate
      working-directory: ./Feasto-Server
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/feasto_test?schema=public
      run: npx prisma migrate deploy

    - name: Build TypeScript
      working-directory: ./Feasto-Server
      run: npm run build
